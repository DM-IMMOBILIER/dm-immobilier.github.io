<!DOCTYPE html>

    <title>DM IMMOBILIER – Mini-cités écologiques & logements modernes</title>

    <meta name="description" content="DM IMMOBILIER conçoit des mini-cités écologiques, modernes et accessibles en Côte d’Ivoire et en France. Logements pour familles, jeunes actifs et investisseurs. Qualité, sécurité et innovation.">

    <style>
/* --- FOND ANIMÉ PLEINE PAGE --- */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    animation: slider 28s infinite ease-in-out;
    position: relative;
    color: white;
}

/* --- VOILE SOMBRE --- */
body::before {
    z-index: -1; /* entre le fond animé et le contenu */
}
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* --- ANIMATION DES IMAGES --- */
@keyframes slider {
    0%   { background-image: url('motobe.jpg'); }
    25%  { background-image: url('ouguedoume.jpg'); }
    50%  { background-image: url('citebouake.jpg'); }
    75%  { background-image: url('memni.jpg'); }
    100% { background-image: url('motobe.jpg'); }
}
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    animation: slider 28s infinite ease-in-out;
    z-index: -2; /* derrière tout */
}

/* --- TOUT RENDRE TRANSPARENT --- */
header, nav, section, .hero, .container, .intro, .accueil {
    background: transparent !important;
}

/* --- MENU DORÉ --- */
nav a {
    margin: 0 15px;
    color: #f4d27a !important;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    text-shadow: 0px 0px 6px rgba(0,0,0,0.8);
}

nav a:hover {
    color: white !important;
}

/* --- HERO --- */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 34px;
    font-weight: bold;
    color: white;
}

.hero p {
    font-size: 18px;
    max-width: 700px;
    margin: 20px auto;
    color: white;
}

/* --- BOUTONS --- */
.buttons {
    margin-top: 30px;
}

.btn {
    padding: 14px 28px;
    margin: 10px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.btn-gold {
    background-color: #f4d27a;
    color: #2c2c2c;
}

.btn-green {
    background-color: #a8e6b1;
    color: #2c2c2c;
}

.btn-white {
    background-color: white;
    color: #2c2c2c;
}
    
.btn-white:hover {
    background-color: #f0f0f0;
}
 </style>
</head>

<body>

<img src="logo.png" alt="Logo DM IMMOBILIER" width="250">

        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Des logements pour chaque famille, chaque rêve, chaque budget.</h1>

    <p>DM IMMOBILIER transforme les villages et contrées reculées en villes paradisiaques grâce à des mini-cités écologiques, modernes et accessibles.</p>

    <div class="buttons">
        <button class="btn btn-white">Mini-cités écologiques</button>
        <button class="btn btn-white">Présence CI / FR</button>
        <button class="btn btn-white">Accessibilité & Prestige</button>
    </div>

    <div class="buttons">
        <button class="btn btn-gold">Voir nos biens</button>
        <button class="btn btn-green">Nous contacter</button>
    </div>
</section>
