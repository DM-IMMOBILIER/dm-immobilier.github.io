       /* --- FOND ANIMÉ PLEINE PAGE --- */
body {
    margin: 0;

    background-size: cover;
    background-position: center;
    animation: slider 28s infinite ease-in-out;
    position: relative;
}

/* --- VOILE SOMBRE POUR LISIBILITÉ --- */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45); /* voile sombre élégant */
    z-index: -1;
}

/* --- ANIMATION DES IMAGES --- */
@keyframes slider {
    0%   { background-image: url('motobe.jpg'); }
    25%  { background-image: url('ouguedoume.jpg'); }
    50%  { background-image: url('citebouake.jpg'); }
    75%  { background-image: url('memni.jpg'); }
    100% { background-image: url('motobe.jpg'); }
}
